<svg width="720" height="380" viewBox="0 0 720 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="720" height="380" fill="#0f1219"/>

  <!-- Layer 5: App -->
  <rect x="60" y="40" width="600" height="52" rx="4" fill="#15cbfc" fill-opacity="0.12" stroke="#15cbfc" stroke-opacity="0.4" stroke-width="1"/>
  <text x="80" y="72" font-family="monospace" font-size="13" fill="#15cbfc" opacity="0.9">App Layer</text>
  <text x="360" y="72" font-family="monospace" font-size="11" fill="#15cbfc" opacity="0.5" text-anchor="middle">screens · routing · state management</text>

  <!-- Layer 4: Features -->
  <rect x="60" y="108" width="600" height="52" rx="4" fill="#8052ff" fill-opacity="0.12" stroke="#8052ff" stroke-opacity="0.4" stroke-width="1"/>
  <text x="80" y="140" font-family="monospace" font-size="13" fill="#8052ff" opacity="0.9">Feature Layer</text>
  <text x="360" y="140" font-family="monospace" font-size="11" fill="#8052ff" opacity="0.5" text-anchor="middle">auth · feed · profile · settings</text>

  <!-- Layer 3: Components -->
  <rect x="60" y="176" width="600" height="52" rx="4" fill="#f05237" fill-opacity="0.12" stroke="#f05237" stroke-opacity="0.4" stroke-width="1"/>
  <text x="80" y="208" font-family="monospace" font-size="13" fill="#f05237" opacity="0.9">Component Layer</text>
  <text x="360" y="208" font-family="monospace" font-size="11" fill="#f05237" opacity="0.5" text-anchor="middle">buttons · cards · inputs · modals</text>

  <!-- Layer 2: Tokens -->
  <rect x="60" y="244" width="600" height="52" rx="4" fill="#ffd54a" fill-opacity="0.12" stroke="#ffd54a" stroke-opacity="0.4" stroke-width="1"/>
  <text x="80" y="276" font-family="monospace" font-size="13" fill="#ffd54a" opacity="0.9">Token Layer</text>
  <text x="360" y="276" font-family="monospace" font-size="11" fill="#ffd54a" opacity="0.5" text-anchor="middle">colors · spacing · typography · radii</text>

  <!-- Layer 1: Foundation -->
  <rect x="60" y="312" width="600" height="48" rx="4" fill="#f29111" fill-opacity="0.12" stroke="#f29111" stroke-opacity="0.4" stroke-width="1"/>
  <text x="80" y="341" font-family="monospace" font-size="13" fill="#f29111" opacity="0.9">Foundation</text>
  <text x="360" y="341" font-family="monospace" font-size="11" fill="#f29111" opacity="0.5" text-anchor="middle">theme · breakpoints · constants</text>

  <!-- Label -->
  <text x="360" y="376" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.2)" text-anchor="middle">Flutter Design System — Layer Architecture</text>
</svg>
